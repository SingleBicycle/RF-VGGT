defaults:
  - default_dataset.yaml

exp_name: rf_vggt_final_full
img_size: 336
patch_size: 14
embed_dim: 1024
num_workers: 4
seed_value: 42
accum_steps: 1
val_epoch_freq: 1
max_img_per_gpu: 4

limit_train_batches: null
limit_val_batches: null

geometry:
  enable_depth: True
  enable_point: True

rf_scene_roots: /YOUR/PATH/TO/RF_SCENES

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config:
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: False
      track_num: 1024
      training: True
      inside_random: True
      img_size: ${img_size}
      patch_size: ${patch_size}
      rescale: True
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: True
      load_world_points: True
      load_point_masks: True
      depth_dir: depths
      world_points_dir: null
      point_mask_dir: null
      depth_mask_dir: null
      img_nums: [1, 8]
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: True
      repeat_batch: False
      rf_feature_root: null
      rf_layout: scene_local
      rf_subdir: rf_angular_images_gaussian/npz
      rf_feature_key: angular_image
      rf_pack_mode: dense_sparse_mask
      allow_missing_rf: False
      use_raw_rf_paths: True
      raw_rf_subdir: rf
      raw_rf_top_k: 64
      raw_rf_sort_by: pdp_power
      allow_missing_raw_rf: False
      augs:
        cojitter: True
        cojitter_ratio: 0.3
        scales: null
        aspects: [0.75, 1.0]
        color_jitter:
          brightness: 0.25
          contrast: 0.25
          saturation: 0.2
          hue: 0.05
          p: 0.8
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.rf_scene.RFSceneDataset
          scene_roots: ${rf_scene_roots}
          require_rf: True
          rf_subdir: rf_angular_images_gaussian/npz
          rf_pack_mode: dense_sparse_mask
          use_raw_rf_paths: True
          raw_rf_subdir: rf
          raw_rf_top_k: 64
          sampling_strategy: mixed
          nearby_window: 10
          wide_baseline_prob: 0.3
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: False
    pin_memory: False
    common_config:
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: False
      track_num: 1024
      training: False
      inside_random: False
      img_size: ${img_size}
      patch_size: ${patch_size}
      rescale: True
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: True
      load_world_points: True
      load_point_masks: True
      depth_dir: depths
      world_points_dir: null
      point_mask_dir: null
      depth_mask_dir: null
      img_nums: [1, 8]
      allow_duplicate_img: True
      repeat_batch: False
      rf_feature_root: null
      rf_layout: scene_local
      rf_subdir: rf_angular_images_gaussian/npz
      rf_feature_key: angular_image
      rf_pack_mode: dense_sparse_mask
      allow_missing_rf: False
      use_raw_rf_paths: True
      raw_rf_subdir: rf
      raw_rf_top_k: 64
      raw_rf_sort_by: pdp_power
      allow_missing_raw_rf: False
      augs:
        cojitter: False
        cojitter_ratio: 0.5
        scales: null
        aspects: [1.0, 1.0]
        color_jitter: null
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.rf_scene.RFSceneDataset
          scene_roots: ${rf_scene_roots}
          require_rf: True
          rf_subdir: rf_angular_images_gaussian/npz
          rf_pack_mode: dense_sparse_mask
          use_raw_rf_paths: True
          raw_rf_subdir: rf
          raw_rf_top_k: 64
          sampling_strategy: uniform

logging:
  log_dir: logs
  log_visuals: False
  log_freq: 10
  log_level_primary: INFO
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_total
        - loss_camera
        - loss_depth
        - loss_point
        - loss_rf_angular
        - loss_rf_path
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_conf_point
        - loss_reg_point
        - loss_grad_point
        - rf_angular_bce
        - rf_angular_dice
        - rf_angular_corr
        - rf_path_l1
        - rf_path_js
        - rf_path_emd
        - rf_adapter_gate_mean
        - rf_adapter_gate_camera_mean
        - rf_adapter_gate_patch_mean
        - rf_token_confidence_mean
    val:
      keys_to_log:
        - loss_objective
        - loss_total
        - loss_camera
        - loss_depth
        - loss_point
        - loss_rf_angular
        - loss_rf_path
        - rf_adapter_gate_mean
        - rf_adapter_gate_camera_mean
        - rf_adapter_gate_patch_mean
        - rf_token_confidence_mean

checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 1
  resume_checkpoint_path: null
  strict: False

loss:
  _target_: loss.MultitaskLoss
  camera_weight: 1.0
  depth_weight: 0.5
  point_weight: 0.5
  rf_angular_weight: 0.05
  rf_path_weight: 0.02
  skip_missing_geometry_gt: True
  camera:
    weight: 1.0
    loss_type: l1
  depth:
    weight: 1.0
    gradient_loss_fn: grad
    valid_range: 0.98
  point:
    weight: 1.0
    gradient_loss_fn: normal
    valid_range: 0.98
  rf_angular:
    enabled: True
    bce_weight: 0.4
    dice_weight: 0.3
    corr_weight: 0.3
    max_points_per_view: 4096
    angular_grid: [90, 360]
    pose_source: gt_first
    frame_mode: camera
  rf_path:
    enabled: True
    path_delay_index: 0
    path_amplitude_index: null
    delay_to_meter: 1.0
    range_min: 0.0
    range_max: 20.0
    range_bins: 64
    hist_sigma: 0.15
    max_points_per_view: 4096
  track: null

optim:
  param_group_modifiers: False
  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05
  frozen_module_names: []
  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: [rescaled, rescaled]
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

max_epochs: 20

training:
  log_rf_metrics: True

model:
  _target_: vggt.models.vggt.VGGT
  img_size: ${img_size}
  patch_size: ${patch_size}
  embed_dim: ${embed_dim}
  enable_camera: True
  enable_depth: True
  enable_point: True
  enable_track: False
  aggregator_kwargs: null
  use_rf: True
  rf:
    encoder_type: final_v2
    in_channels: 8
    angular_size: [90, 360]
    angular_token_grid: [9, 36]
    embed_dim: ${model.embed_dim}
    use_angular: True
    use_paths: True
    use_global: True
    global_dim: 7
    angular_encoder:
      circular_azimuth_padding: True
      use_dense_stem: True
      use_sparse_stem: True
      use_confidence_stem: True
      append_summary_token: True
    path_encoder:
      max_path_tokens: 64
      path_dim: 17
      num_layers: 2
      num_heads: 8
      range_bins: 64
      path_delay_index: 0
      path_amplitude_index: null
      delay_to_meter: 1.0
    scene_sync:
      enabled: True
      num_layers: 2
      num_heads: 8
      dropout: 0.1
      append_scene_token: True
    adapter:
      enabled: True
      layers: every_4_plus_last
      every: 4
      include_last: True
      late_adapter: True
      token_type_gating: True
      use_rf_confidence_bias: True
      fusion_scale_init: 0.0
      gate_bias_init: -2.0
      dropout: 0.1
      rf_fuse_special_tokens: True

distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
